<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Выживание 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#87CEEB; font-family:'Segoe UI',sans-serif; }
canvas { display:block; }

#crosshair {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none; z-index:10;
  width:18px; height:18px;
}
#crosshair::before,#crosshair::after {
  content:''; position:absolute; background:rgba(255,255,255,0.95);
  border-radius:1px; box-shadow:0 0 2px #000;
}
#crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
#crosshair::after  { width:100%; height:2px; top:50%; transform:translateY(-50%); }

/* STATS */
#stats {
  position:fixed; top:12px; left:12px; z-index:10;
  display:flex; flex-direction:column; gap:5px;
}
.srow { display:flex; align-items:center; gap:7px; }
.sico { font-size:15px; width:20px; text-align:center; }
.sbar {
  width:140px; height:11px;
  background:rgba(0,0,0,0.5); border-radius:6px; overflow:hidden;
  border:1px solid rgba(255,255,255,0.15);
}
.sfill { height:100%; border-radius:6px; transition:width 0.25s; }
#b-hp    { background:linear-gradient(90deg,#c0392b,#e74c3c); }
#b-food  { background:linear-gradient(90deg,#b7470a,#e67e22); }
#b-water { background:linear-gradient(90deg,#1565a8,#3498db); }
#b-stam  { background:linear-gradient(90deg,#1a8a1a,#27ae60); }

/* HOTBAR */
#hotbar {
  position:fixed; bottom:12px; left:50%; transform:translateX(-50%);
  display:flex; gap:4px; z-index:10;
}
.slot {
  width:54px; height:54px;
  background:rgba(10,10,10,0.75);
  border:2px solid rgba(255,255,255,0.2);
  border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  position:relative; cursor:pointer; user-select:none;
  transition:border-color .1s, box-shadow .1s;
}
.slot:hover { border-color:rgba(255,255,255,0.45); }
.slot.active { border-color:#ffe066; box-shadow:0 0 10px rgba(255,220,80,.6); }
.slot.dragover { border-color:#4fc3f7; }
.snum { position:absolute; top:2px; left:5px; font-size:10px; color:rgba(255,255,255,.4); }
.sicon { font-size:24px; line-height:1; }
.scnt { position:absolute; bottom:2px; right:4px; font-size:11px; color:#fff; font-weight:700; text-shadow:0 1px 2px #000; }

/* HINT */
#hint {
  position:fixed; top:36%; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,.65); color:#fff; font-size:14px; font-weight:600;
  padding:6px 16px; border-radius:9px; pointer-events:none;
  opacity:0; transition:opacity .2s; z-index:20; text-shadow:0 1px 3px #000;
  white-space:nowrap;
}

/* INVENTORY */
#inv-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.72);
  display:none; align-items:center; justify-content:center; z-index:100;
}
#inv-wrap { display:flex; gap:14px; align-items:flex-start; }
#inv-box, #craft-box {
  background:rgba(16,16,16,.97);
  border:2px solid rgba(255,255,255,.13);
  border-radius:13px; padding:22px;
}
.boxtitle {
  color:#ffe066; font-size:17px; font-weight:700;
  text-align:center; margin-bottom:12px; letter-spacing:.5px;
}
#inv-grid { display:grid; grid-template-columns:repeat(9,54px); gap:4px; margin-bottom:6px; }
#inv-hbar { display:grid; grid-template-columns:repeat(9,54px); gap:4px;
  border-top:1px solid rgba(255,255,255,.1); padding-top:6px; }
#inv-tip { color:rgba(255,255,255,.28); font-size:11px; text-align:center; margin-top:8px; }

/* CRAFT */
#craft-box { min-width:210px; }
.crecipe {
  display:flex; align-items:center; gap:9px;
  padding:7px 8px; border-radius:7px; margin-bottom:5px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
}
.crecipe.ok { border-color:rgba(255,220,80,.4); background:rgba(255,220,80,.06); }
.cname { flex:1; color:#ddd; font-size:13px; }
.creq  { color:#888; font-size:11px; }
.cbtn {
  padding:4px 9px; border-radius:5px; border:none; cursor:pointer;
  background:#ffe066; color:#111; font-weight:700; font-size:12px;
}
.cbtn:disabled { background:#444; color:#666; cursor:not-allowed; }

/* DRAG GHOST */
#ghost {
  position:fixed; pointer-events:none; font-size:30px;
  z-index:200; transform:translate(-50%,-50%); display:none;
}

/* SWIM */
#swim-vfx {
  position:fixed; inset:0; pointer-events:none;
  background:rgba(15,80,160,.2); display:none; z-index:5;
}

/* CONTROLS */
#ctrlhint {
  position:fixed; bottom:76px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,.5); font-size:11px; pointer-events:none; z-index:10;
  text-shadow:0 1px 2px #000;
}
</style>
</head>
<body>
<div id="crosshair"></div>
<div id="hint"></div>
<div id="swim-vfx"></div>

<div id="stats">
  <div class="srow"><span class="sico">❤️</span><div class="sbar"><div class="sfill" id="b-hp"    style="width:100%"></div></div></div>
  <div class="srow"><span class="sico">🍖</span><div class="sbar"><div class="sfill" id="b-food"  style="width:100%"></div></div></div>
  <div class="srow"><span class="sico">💧</span><div class="sbar"><div class="sfill" id="b-water" style="width:100%"></div></div></div>
  <div class="srow"><span class="sico">⚡</span><div class="sbar"><div class="sfill" id="b-stam"  style="width:100%"></div></div></div>
</div>

<div id="hotbar"></div>

<div id="inv-overlay">
  <div id="inv-wrap">
    <div id="inv-box">
      <div class="boxtitle">🎒 Инвентарь</div>
      <div id="inv-grid"></div>
      <div id="inv-hbar"></div>
      <div id="inv-tip">E — закрыть · перетаскивай предметы</div>
    </div>
    <div id="craft-box">
      <div class="boxtitle">⚒ Крафт</div>
      <div id="craft-list"></div>
    </div>
  </div>
</div>

<div id="ghost"></div>
<div id="ctrlhint">WASD — ход · Shift — бег · Пробел — прыжок · F — пить · E — инвентарь · ЛКМ — действие</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js"></script>
</body>
</html>
