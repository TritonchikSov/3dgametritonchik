<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Выживание 3D</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; font-family:Arial,sans-serif; touch-action:none; }
canvas { display:block; }

/* ── MAIN MENU ── */
#menu {
  position:fixed; inset:0; z-index:200;
  background:linear-gradient(160deg,#1a3a1a 0%,#0d1f0d 60%,#0a1a2a 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
}
#menu h1 { color:#ffe066; font-size:42px; font-weight:900; letter-spacing:2px; text-shadow:0 2px 12px #000; margin-bottom:8px; }
#menu h2 { color:rgba(255,255,255,.5); font-size:15px; font-weight:400; margin-top:-14px; margin-bottom:10px; }
.menu-section { display:flex; flex-direction:column; align-items:center; gap:8px; }
.menu-label { color:rgba(255,255,255,.55); font-size:13px; letter-spacing:1px; text-transform:uppercase; }
.btn-row { display:flex; gap:10px; }
.mbtn {
  padding:10px 24px; border-radius:9px; border:2px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.07); color:#fff; font-size:15px; cursor:pointer;
  transition:background .15s, border-color .15s;
}
.mbtn:hover, .mbtn.sel { background:rgba(255,220,80,.18); border-color:#ffe066; color:#ffe066; }
.play-btn {
  margin-top:10px; padding:14px 48px; border-radius:12px; border:none;
  background:linear-gradient(135deg,#ffe066,#f0a000); color:#111;
  font-size:18px; font-weight:800; cursor:pointer; letter-spacing:1px;
  box-shadow:0 4px 20px rgba(255,180,0,.4);
  transition:transform .1s, box-shadow .1s;
}
.play-btn:hover { transform:scale(1.04); box-shadow:0 6px 28px rgba(255,180,0,.6); }

/* ── CROSSHAIR ── */
#crosshair {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none; z-index:10;
}
#crosshair::before, #crosshair::after {
  content:''; position:absolute; background:rgba(255,255,255,.9);
}
#crosshair::before { width:2px; height:20px; left:50%; transform:translateX(-50%); }
#crosshair::after  { width:20px; height:2px; top:50%; transform:translateY(-50%); }

/* ── HUD ── */
#hud { position:fixed; top:12px; left:12px; z-index:10; display:flex; flex-direction:column; gap:5px; }
.bar-row { display:flex; align-items:center; gap:8px; }
.bar-label { font-size:16px; width:22px; }
.bar-bg { width:150px; height:12px; background:rgba(0,0,0,.5); border-radius:6px; overflow:hidden; border:1px solid rgba(255,255,255,.2); }
.bar-fill { height:100%; border-radius:6px; transition:width .3s; }
#hp-bar    { background:linear-gradient(90deg,#c0392b,#e74c3c); }
#food-bar  { background:linear-gradient(90deg,#b7470a,#e67e22); }
#water-bar { background:linear-gradient(90deg,#1565a8,#3498db); }
#stam-bar  { background:linear-gradient(90deg,#1a8a1a,#27ae60); }

/* ── HOTBAR ── */
#hotbar { position:fixed; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:4px; z-index:10; }
.slot {
  width:56px; height:56px; background:rgba(0,0,0,.7);
  border:2px solid rgba(255,255,255,.25); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  position:relative; cursor:pointer; user-select:none;
}
.slot.active { border-color:#ffe066; box-shadow:0 0 8px rgba(255,220,80,.7); }
.slot.hover  { border-color:rgba(255,255,255,.6); }
.slot-num  { position:absolute; top:2px; left:5px; font-size:10px; color:rgba(255,255,255,.4); }
.slot-icon { font-size:26px; line-height:1; }
.slot-cnt  { position:absolute; bottom:2px; right:4px; font-size:11px; color:#fff; font-weight:700; text-shadow:0 1px 2px #000; }

/* ── HINT ── */
#hint {
  position:fixed; top:35%; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,.7); color:#fff; font-size:14px; font-weight:600;
  padding:7px 18px; border-radius:10px; pointer-events:none;
  opacity:0; transition:opacity .2s; z-index:20; white-space:nowrap;
}

/* ── INVENTORY ── */
#inv-bg {
  position:fixed; inset:0; background:rgba(0,0,0,.75);
  display:none; align-items:center; justify-content:center; z-index:100;
  overflow:auto;
}
#inv-wrap { display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap; justify-content:center; padding:20px; }
.panel { background:rgba(15,15,15,.97); border:2px solid rgba(255,255,255,.15); border-radius:12px; padding:22px; }
.panel-title { color:#ffe066; font-size:17px; font-weight:700; text-align:center; margin-bottom:12px; }
#inv-grid   { display:grid; grid-template-columns:repeat(9,56px); gap:4px; margin-bottom:6px; }
#inv-hotbar { display:grid; grid-template-columns:repeat(9,56px); gap:4px; border-top:1px solid rgba(255,255,255,.1); padding-top:6px; }
#inv-tip    { color:rgba(255,255,255,.3); font-size:11px; text-align:center; margin-top:8px; }
#craft-panel { min-width:220px; }
.recipe { display:flex; align-items:center; gap:8px; padding:7px; border-radius:7px; margin-bottom:5px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); }
.recipe.can { border-color:rgba(255,220,80,.4); background:rgba(255,220,80,.05); }
.recipe-name { flex:1; color:#ddd; font-size:13px; }
.recipe-req  { color:#888; font-size:11px; }
.craft-btn { padding:4px 10px; border-radius:5px; border:none; cursor:pointer; background:#ffe066; color:#111; font-weight:700; font-size:12px; }
.craft-btn:disabled { background:#444; color:#666; cursor:not-allowed; }

/* ── DRAG ── */
#drag-ghost { position:fixed; pointer-events:none; font-size:30px; z-index:200; transform:translate(-50%,-50%); display:none; }

/* ── SWIM ── */
#swim-fx { position:fixed; inset:0; pointer-events:none; background:rgba(10,70,150,.22); display:none; z-index:5; }

/* ── CONTROLS HINT ── */
#controls { position:fixed; bottom:78px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,.5); font-size:11px; pointer-events:none; z-index:10; }

/* ── MOBILE JOYSTICK ── */
#mobile-ui { position:fixed; inset:0; pointer-events:none; z-index:15; display:none; }
#joystick-zone {
  position:absolute; bottom:90px; left:20px;
  width:120px; height:120px;
  background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.2);
  border-radius:50%; pointer-events:all;
}
#joystick-knob {
  position:absolute; width:48px; height:48px;
  background:rgba(255,255,255,.35); border-radius:50%;
  top:50%; left:50%; transform:translate(-50%,-50%);
  pointer-events:none;
}
#btn-jump {
  position:absolute; bottom:90px; right:20px;
  width:64px; height:64px; border-radius:50%;
  background:rgba(255,255,255,.18); border:2px solid rgba(255,255,255,.3);
  color:#fff; font-size:22px; display:flex; align-items:center; justify-content:center;
  pointer-events:all; user-select:none;
}
#btn-action {
  position:absolute; bottom:170px; right:20px;
  width:64px; height:64px; border-radius:50%;
  background:rgba(255,100,100,.25); border:2px solid rgba(255,100,100,.4);
  color:#fff; font-size:22px; display:flex; align-items:center; justify-content:center;
  pointer-events:all; user-select:none;
}
#btn-inv {
  position:absolute; top:12px; right:12px;
  width:54px; height:54px; border-radius:10px;
  background:rgba(0,0,0,.5); border:2px solid rgba(255,255,255,.25);
  color:#fff; font-size:22px; display:flex; align-items:center; justify-content:center;
  pointer-events:all; user-select:none;
}
#look-zone {
  position:absolute; inset:0;
  pointer-events:all;
}
</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="menu">
  <h1>🌲 Выживание 3D</h1>
  <h2 id="menu-sub">Survival 3D</h2>

  <div class="menu-section">
    <div class="menu-label" id="lbl-lang">Язык / Language</div>
    <div class="btn-row">
      <button class="mbtn sel" id="btn-ru" onclick="setLang('ru')">🇷🇺 RU</button>
      <button class="mbtn"     id="btn-en" onclick="setLang('en')">🇬🇧 EN</button>
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-label" id="lbl-ctrl">Управление</div>
    <div class="btn-row">
      <button class="mbtn sel" id="btn-pc"    onclick="setCtrl('pc')">🖥️ ПК</button>
      <button class="mbtn"     id="btn-phone" onclick="setCtrl('phone')">📱 Телефон</button>
    </div>
  </div>

  <button class="play-btn" id="play-btn" onclick="startGame()">▶ Играть</button>
</div>

<!-- GAME UI -->
<div id="crosshair" style="display:none"></div>
<div id="hint"></div>
<div id="swim-fx"></div>

<div id="hud" style="display:none">
  <div class="bar-row"><span class="bar-label">❤️</span><div class="bar-bg"><div class="bar-fill" id="hp-bar"    style="width:100%"></div></div></div>
  <div class="bar-row"><span class="bar-label">🍖</span><div class="bar-bg"><div class="bar-fill" id="food-bar"  style="width:100%"></div></div></div>
  <div class="bar-row"><span class="bar-label">💧</span><div class="bar-bg"><div class="bar-fill" id="water-bar" style="width:100%"></div></div></div>
  <div class="bar-row"><span class="bar-label">⚡</span><div class="bar-bg"><div class="bar-fill" id="stam-bar"  style="width:100%"></div></div></div>
</div>

<div id="hotbar" style="display:none"></div>

<div id="inv-bg">
  <div id="inv-wrap">
    <div class="panel">
      <div class="panel-title" id="inv-title">🎒 Инвентарь</div>
      <div id="inv-grid"></div>
      <div id="inv-hotbar"></div>
      <div id="inv-tip">E — закрыть · перетаскивай предметы мышью</div>
    </div>
    <div class="panel" id="craft-panel">
      <div class="panel-title" id="craft-title">⚒ Крафт</div>
      <div id="craft-list"></div>
    </div>
  </div>
</div>

<div id="drag-ghost"></div>
<div id="controls"></div>

<!-- MOBILE UI -->
<div id="mobile-ui">
  <div id="look-zone"></div>
  <div id="joystick-zone"><div id="joystick-knob"></div></div>
  <div id="btn-jump">⬆️</div>
  <div id="btn-action">⚔️</div>
  <div id="btn-inv">🎒</div>
</div>

<script>
// ── Menu logic ──────────────────────────────────────
var LANG = 'ru';
var CTRL = 'pc';

var T = {
  ru: { lang:'Язык', ctrl:'Управление', play:'▶ Играть', inv:'🎒 Инвентарь', craft:'⚒ Крафт',
        controls:'WASD — движение · Shift — бег · Пробел — прыжок · F — пить · E — инвентарь · ЛКМ — действие',
        pc:'🖥️ ПК', phone:'📱 Телефон' },
  en: { lang:'Language', ctrl:'Controls', play:'▶ Play', inv:'🎒 Inventory', craft:'⚒ Craft',
        controls:'WASD — move · Shift — run · Space — jump · F — drink · E — inventory · LMB — action',
        pc:'🖥️ PC', phone:'📱 Phone' }
};

function setLang(l) {
  LANG = l;
  document.getElementById('btn-ru').classList.toggle('sel', l==='ru');
  document.getElementById('btn-en').classList.toggle('sel', l==='en');
  var t = T[l];
  document.getElementById('lbl-lang').textContent = t.lang;
  document.getElementById('lbl-ctrl').textContent = t.ctrl;
  document.getElementById('play-btn').textContent = t.play;
  document.getElementById('btn-pc').textContent    = t.pc;
  document.getElementById('btn-phone').textContent = t.phone;
}

function setCtrl(c) {
  CTRL = c;
  document.getElementById('btn-pc').classList.toggle('sel',    c==='pc');
  document.getElementById('btn-phone').classList.toggle('sel', c==='phone');
}

function startGame() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('crosshair').style.display = '';
  document.getElementById('hud').style.display = '';
  document.getElementById('hotbar').style.display = '';
  var t = T[LANG];
  document.getElementById('inv-title').textContent   = t.inv;
  document.getElementById('craft-title').textContent = t.craft;
  document.getElementById('controls').textContent    = t.controls;
  if (CTRL === 'phone') {
    document.getElementById('mobile-ui').style.display = 'block';
    document.getElementById('crosshair').style.display = 'none';
    document.getElementById('controls').style.display  = 'none';
    initMobile();
  } else {
    renderer.domElement.requestPointerLock();
  }
  gameStarted = true;
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js"></script>
<script src="building.js"></script>
</body>
</html>
