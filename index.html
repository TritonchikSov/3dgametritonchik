<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>3D Выживание</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Arial, sans-serif; }
    canvas { display: block; }

    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 20px; height: 20px; pointer-events: none; z-index: 10;
    }
    #crosshair::before, #crosshair::after {
      content:''; position:absolute; background:rgba(255,255,255,0.85);
      border-radius:2px;
    }
    #crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
    #crosshair::after  { width:100%; height:2px; top:50%; transform:translateY(-50%); }

    #hint-popup {
      position:fixed; top:38%; left:50%; transform:translateX(-50%);
      color:#fff; font-size:15px; font-weight:600;
      background:rgba(0,0,0,0.6); padding:7px 18px;
      border-radius:10px; pointer-events:none;
      opacity:0; transition:opacity 0.25s; z-index:20;
      text-shadow:0 1px 3px #000;
    }

    /* ── Stats bars ── */
    #stats {
      position:fixed; top:14px; left:14px;
      display:flex; flex-direction:column; gap:6px; z-index:10;
    }
    .stat-row { display:flex; align-items:center; gap:8px; }
    .stat-label { font-size:13px; color:#fff; text-shadow:0 1px 3px #000; width:22px; text-align:center; }
    .stat-track {
      width:140px; height:13px;
      background:rgba(0,0,0,0.4); border-radius:7px; overflow:hidden;
      border:1px solid rgba(255,255,255,0.2);
    }
    .stat-fill { height:100%; border-radius:7px; transition:width 0.3s; }
    #hp-fill    { background: linear-gradient(90deg,#c0392b,#e74c3c); }
    #food-fill  { background: linear-gradient(90deg,#d35400,#e67e22); }
    #water-fill { background: linear-gradient(90deg,#1a6fa8,#3498db); }

    /* ── Hotbar ── */
    #hotbar {
      position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
      display:flex; gap:5px; z-index:10;
    }
    .slot {
      width:56px; height:56px;
      background:rgba(20,20,20,0.7);
      border:2px solid rgba(255,255,255,0.25);
      border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      color:#fff; cursor:pointer; position:relative;
      transition:border-color 0.1s, box-shadow 0.1s;
      user-select:none;
    }
    .slot:hover { border-color:rgba(255,255,255,0.5); }
    .slot.active { border-color:#ffe066; box-shadow:0 0 10px rgba(255,220,80,0.7); }
    .slot.drag-over { border-color:#4fc3f7; }
    .slot-num {
      position:absolute; top:3px; left:6px;
      font-size:10px; color:rgba(255,255,255,0.45);
    }
    .slot-icon { font-size:26px; line-height:1; }
    .slot-count {
      position:absolute; bottom:3px; right:5px;
      font-size:11px; color:#fff; font-weight:700;
      text-shadow:0 1px 2px #000;
    }

    /* ── Inventory ── */
    #inventory {
      position:fixed; inset:0;
      background:rgba(0,0,0,0.7);
      display:none; align-items:center; justify-content:center; z-index:100;
    }
    #inv-panel {
      background:rgba(18,18,18,0.97);
      border:2px solid rgba(255,255,255,0.15);
      border-radius:14px; padding:26px 28px;
    }
    #inv-title {
      color:#ffe066; font-size:19px; font-weight:700;
      text-align:center; margin-bottom:14px; letter-spacing:1px;
    }
    #inv-grid {
      display:grid; grid-template-columns:repeat(9,56px); gap:5px; margin-bottom:8px;
    }
    #inv-hotbar-row {
      display:grid; grid-template-columns:repeat(9,56px); gap:5px;
      border-top:1px solid rgba(255,255,255,0.12); padding-top:8px;
    }
    #inv-hint {
      color:rgba(255,255,255,0.3); font-size:12px;
      text-align:center; margin-top:10px;
    }

    /* ── Drag ghost ── */
    #drag-ghost {
      position:fixed; pointer-events:none;
      font-size:32px; z-index:200;
      transform:translate(-50%,-50%); display:none;
    }

    /* ── Swimming overlay ── */
    #swim-overlay {
      position:fixed; inset:0; pointer-events:none;
      background:rgba(30,100,180,0.18); z-index:5;
      display:none;
    }

    #controls-hint {
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
      color:rgba(255,255,255,0.6); font-size:12px;
      text-shadow:0 1px 2px #000; pointer-events:none; z-index:10;
    }
  </style>
</head>
<body>
  <div id="crosshair"></div>
  <div id="hint-popup"></div>
  <div id="swim-overlay"></div>

  <div id="stats">
    <div class="stat-row"><span class="stat-label">❤️</span><div class="stat-track"><div class="stat-fill" id="hp-fill" style="width:100%"></div></div></div>
    <div class="stat-row"><span class="stat-label">🍖</span><div class="stat-track"><div class="stat-fill" id="food-fill" style="width:100%"></div></div></div>
    <div class="stat-row"><span class="stat-label">💧</span><div class="stat-track"><div class="stat-fill" id="water-fill" style="width:100%"></div></div></div>
  </div>

  <div id="hotbar"></div>

  <div id="inventory">
    <div id="inv-panel">
      <div id="inv-title">⚒ Инвентарь</div>
      <div id="inv-grid"></div>
      <div id="inv-hotbar-row"></div>
      <div id="inv-hint">E — закрыть &nbsp;|&nbsp; Перетаскивай предметы мышью</div>
    </div>
  </div>

  <div id="drag-ghost"></div>
  <div id="controls-hint">WASD — движение &nbsp;|&nbsp; E — инвентарь &nbsp;|&nbsp; ЛКМ — действие &nbsp;|&nbsp; F — пить воду</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
