<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Выживание на острове</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:Arial,sans-serif}
canvas{display:block}

/* ── MENU ── */
#menu{
  position:fixed;inset:0;z-index:100;
  background:linear-gradient(160deg,#0d1f0d,#0a1a2a);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px
}
#menu h1{color:#ffe066;font-size:40px;font-weight:900;letter-spacing:2px;text-shadow:0 2px 12px #000}
#menu p{color:rgba(255,255,255,.45);font-size:14px;margin-top:-10px}
.mrow{display:flex;gap:10px}
.mlabel{color:rgba(255,255,255,.5);font-size:12px;letter-spacing:1px;text-transform:uppercase;text-align:center}
.mbtn{
  padding:9px 22px;border-radius:8px;border:2px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.07);color:#fff;font-size:14px;cursor:pointer;transition:.15s
}
.mbtn:hover,.mbtn.on{background:rgba(255,220,80,.18);border-color:#ffe066;color:#ffe066}
.playbtn{
  margin-top:8px;padding:13px 44px;border-radius:11px;border:none;
  background:linear-gradient(135deg,#ffe066,#f0a000);color:#111;
  font-size:17px;font-weight:800;cursor:pointer;letter-spacing:1px;
  box-shadow:0 4px 20px rgba(255,180,0,.4);transition:.1s
}
.playbtn:hover{transform:scale(1.04)}

/* ── HUD ── */
#hud{position:fixed;top:12px;left:12px;z-index:10;display:flex;flex-direction:column;gap:5px;display:none}
.brow{display:flex;align-items:center;gap:7px}
.bico{font-size:14px;width:20px;text-align:center}
.btrack{width:140px;height:11px;background:rgba(0,0,0,.5);border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.15)}
.bfill{height:100%;border-radius:6px;transition:width .25s}
#b-hp   {background:linear-gradient(90deg,#c0392b,#e74c3c)}
#b-food {background:linear-gradient(90deg,#b7470a,#e67e22)}
#b-water{background:linear-gradient(90deg,#1565a8,#3498db)}
#b-stam {background:linear-gradient(90deg,#1a8a1a,#27ae60)}

/* ── HOTBAR ── */
#hotbar{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10;display:none}
.slot{
  width:54px;height:54px;background:rgba(0,0,0,.72);
  border:2px solid rgba(255,255,255,.22);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  position:relative;cursor:pointer;user-select:none
}
.slot.active{border-color:#ffe066;box-shadow:0 0 10px rgba(255,220,80,.6)}
.slot.dov{border-color:#4fc3f7}
.snum{position:absolute;top:2px;left:5px;font-size:10px;color:rgba(255,255,255,.4)}
.sico{font-size:24px;line-height:1}
.scnt{position:absolute;bottom:2px;right:4px;font-size:11px;color:#fff;font-weight:700;text-shadow:0 1px 2px #000}

/* ── HINT ── */
#hint{
  position:fixed;top:36%;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.68);color:#fff;font-size:14px;font-weight:600;
  padding:6px 16px;border-radius:9px;pointer-events:none;
  opacity:0;transition:opacity .2s;z-index:20;white-space:nowrap
}

/* ── INVENTORY ── */
#inv{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:none;align-items:center;justify-content:center;z-index:100;overflow:auto
}
#inv-wrap{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;justify-content:center;padding:20px}
.panel{background:rgba(14,14,14,.97);border:2px solid rgba(255,255,255,.13);border-radius:12px;padding:22px}
.ptitle{color:#ffe066;font-size:16px;font-weight:700;text-align:center;margin-bottom:11px}
#inv-grid{display:grid;grid-template-columns:repeat(9,54px);gap:4px;margin-bottom:6px}
#inv-hbar{display:grid;grid-template-columns:repeat(9,54px);gap:4px;border-top:1px solid rgba(255,255,255,.1);padding-top:6px}
#inv-tip{color:rgba(255,255,255,.28);font-size:11px;text-align:center;margin-top:8px}
#craft-panel{min-width:210px}
.crec{display:flex;align-items:center;gap:8px;padding:7px;border-radius:7px;margin-bottom:5px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
.crec.ok{border-color:rgba(255,220,80,.4);background:rgba(255,220,80,.06)}
.cname{flex:1;color:#ddd;font-size:13px}
.creq{color:#888;font-size:11px}
.cbtn{padding:4px 9px;border-radius:5px;border:none;cursor:pointer;background:#ffe066;color:#111;font-weight:700;font-size:12px}
.cbtn:disabled{background:#444;color:#666;cursor:not-allowed}

/* ── BUILD MODE ── */
#build-bar{
  position:fixed;top:12px;right:12px;z-index:10;
  background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.15);
  border-radius:9px;padding:10px 14px;color:#fff;font-size:12px;display:none
}
#build-bar b{color:#ffe066}

/* ── MISC ── */
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10;display:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.9)}
#crosshair::before{width:2px;height:18px;left:50%;transform:translateX(-50%)}
#crosshair::after{width:18px;height:2px;top:50%;transform:translateY(-50%)}
#swim{position:fixed;inset:0;pointer-events:none;background:rgba(10,70,150,.2);display:none;z-index:5}
#ghost{position:fixed;pointer-events:none;font-size:28px;z-index:200;transform:translate(-50%,-50%);display:none}
#ctrl{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.45);font-size:11px;pointer-events:none;z-index:10;display:none}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu">
  <h1>🌴 Остров</h1>
  <p>Выживание 3D</p>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div class="mlabel" id="ll">Язык / Language</div>
    <div class="mrow">
      <button class="mbtn on" id="bru" onclick="setLang('ru')">🇷🇺 RU</button>
      <button class="mbtn"    id="ben" onclick="setLang('en')">🇬🇧 EN</button>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
    <div class="mlabel" id="lc">Управление</div>
    <div class="mrow">
      <button class="mbtn on" id="bpc"  onclick="setCtrl('pc')">🖥️ ПК</button>
      <button class="mbtn"    id="bph"  onclick="setCtrl('ph')">📱 Телефон</button>
    </div>
  </div>
  <button class="playbtn" id="pbtn" onclick="startGame()">▶ Играть</button>
</div>

<!-- GAME -->
<div id="crosshair"></div>
<div id="hint"></div>
<div id="swim"></div>
<div id="hud">
  <div class="brow"><span class="bico">❤️</span><div class="btrack"><div class="bfill" id="b-hp"    style="width:100%"></div></div></div>
  <div class="brow"><span class="bico">🍖</span><div class="btrack"><div class="bfill" id="b-food"  style="width:100%"></div></div></div>
  <div class="brow"><span class="bico">💧</span><div class="btrack"><div class="bfill" id="b-water" style="width:100%"></div></div></div>
  <div class="brow"><span class="bico">⚡</span><div class="btrack"><div class="bfill" id="b-stam"  style="width:100%"></div></div></div>
</div>
<div id="hotbar"></div>
<div id="build-bar">Режим строительства<br><b>ЛКМ</b> — поставить &nbsp; <b>ПКМ</b> — убрать &nbsp; <b>B</b> — выйти</div>
<div id="inv">
  <div id="inv-wrap">
    <div class="panel">
      <div class="ptitle" id="it">🎒 Инвентарь</div>
      <div id="inv-grid"></div>
      <div id="inv-hbar"></div>
      <div id="inv-tip">E — закрыть · перетаскивай предметы</div>
    </div>
    <div class="panel" id="craft-panel">
      <div class="ptitle" id="ct">⚒ Крафт</div>
      <div id="craft-list"></div>
    </div>
  </div>
</div>
<div id="ghost"></div>
<div id="ctrl"></div>

<script>
var LANG='ru',CTRL='pc';
var T={
  ru:{lang:'Язык',ctrl:'Управление',play:'▶ Играть',pc:'🖥️ ПК',ph:'📱 Телефон',
      inv:'🎒 Инвентарь',craft:'⚒ Крафт',
      ctrl:'WASD — ход · Shift — бег · Пробел — прыжок · F — пить · E — инвентарь · B — стройка · ЛКМ — действие'},
  en:{lang:'Language',ctrl:'Controls',play:'▶ Play',pc:'🖥️ PC',ph:'📱 Phone',
      inv:'🎒 Inventory',craft:'⚒ Craft',
      ctrl:'WASD — move · Shift — run · Space — jump · F — drink · E — inventory · B — build · LMB — action'}
};
function setLang(l){
  LANG=l;
  document.getElementById('bru').classList.toggle('on',l==='ru');
  document.getElementById('ben').classList.toggle('on',l==='en');
  var t=T[l];
  document.getElementById('ll').textContent=t.lang;
  document.getElementById('lc').textContent=t.ctrl;
  document.getElementById('pbtn').textContent=t.play;
  document.getElementById('bpc').textContent=t.pc;
  document.getElementById('bph').textContent=t.ph;
}
function setCtrl(c){
  CTRL=c;
  document.getElementById('bpc').classList.toggle('on',c==='pc');
  document.getElementById('bph').classList.toggle('on',c==='ph');
}
function startGame(){
  document.getElementById('menu').style.display='none';
  var t=T[LANG];
  document.getElementById('it').textContent=t.inv;
  document.getElementById('ct').textContent=t.craft;
  document.getElementById('ctrl').textContent=t.ctrl;
  document.getElementById('hud').style.display='flex';
  document.getElementById('hotbar').style.display='flex';
  document.getElementById('crosshair').style.display='block';
  document.getElementById('ctrl').style.display='block';
  if(CTRL==='pc') renderer.domElement.requestPointerLock();
  gameStarted=true;
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js"></script>
</body>
</html>
