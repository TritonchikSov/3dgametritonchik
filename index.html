<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Grid Editor</title>
  <style>
    body { font-family: sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    h1 { margin-bottom: 10px; }
    .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
    .controls label { font-size: 14px; }
    .controls select, .controls input[type=color] { padding: 4px; border-radius: 4px; border: none; cursor: pointer; }
    #grid-container { display: grid; grid-template-columns: repeat(5, 60px); grid-template-rows: repeat(5, 60px); gap: 4px; }
    .cell {
      width: 60px; height: 60px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 11px;
      color: #aaa;
      position: relative;
      transition: background 0.15s;
      user-select: none;
    }
    .cell:hover { border-color: #e94560; }
    .cell.filled { color: #fff; }
    .coord { position: absolute; bottom: 2px; right: 4px; font-size: 9px; opacity: 0.5; }
    .layer-nav { display: flex; gap: 8px; align-items: center; margin-top: 14px; }
    .layer-nav button {
      background: #0f3460; color: #eee; border: none; padding: 6px 14px;
      border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    .layer-nav button:hover { background: #e94560; }
    #layer-label { font-size: 16px; min-width: 80px; text-align: center; }
    .layer-dots { display: flex; gap: 5px; margin-top: 8px; }
    .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #0f3460; cursor: pointer; border: 1px solid #444;
    }
    .dot.active { background: #e94560; }
    .dot.has-data { border-color: #4ecca3; }
  </style>
</head>
<body>
  <h1>Grid Editor 5×5 · 10 слоёв</h1>

  <div class="controls">
    <label>Цвет: <input type="color" id="colorPicker" value="#e94560"></label>
    <label>Символ: <input type="text" id="symbolInput" maxlength="3" value="■" style="width:40px;text-align:center;padding:4px;border-radius:4px;border:none;"></label>
    <button onclick="clearLayer()" style="background:#0f3460;color:#eee;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;">Очистить слой</button>
    <button onclick="clearAll()" style="background:#3d0000;color:#eee;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;">Очистить всё</button>
  </div>

  <div id="grid-container"></div>

  <div class="layer-nav">
    <button onclick="changeLayer(-1)">◀</button>
    <span id="layer-label">Слой 1</span>
    <button onclick="changeLayer(1)">▶</button>
  </div>

  <div class="layer-dots" id="layer-dots"></div>

  <script src="app.js"></script>
</body>
</html>
