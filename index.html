<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>3D Прогулка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87CEEB; }
    canvas { display: block; }
    #ui {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: Arial, sans-serif;
      font-size: 14px;
      text-shadow: 1px 1px 2px black;
      text-align: center;
    }
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 24px;
      text-shadow: 1px 1px 2px black;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="crosshair">+</div>
  <div id="ui">WASD — движение &nbsp;|&nbsp; Мышь — обзор &nbsp;|&nbsp; E — инвентарь &nbsp;|&nbsp; 1-9 — слоты</div>

  <!-- Hotbar -->
  <div id="hotbar"></div>

  <!-- Inventory overlay -->
  <div id="inventory" style="display:none">
    <div id="inv-panel">
      <div id="inv-title">Инвентарь</div>
      <div id="inv-grid"></div>
      <div id="inv-hint">E — закрыть</div>
    </div>
  </div>

  <style>
    #hotbar {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
    }
    .slot {
      width: 52px; height: 52px;
      background: rgba(0,0,0,0.45);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 11px; font-family: Arial;
      cursor: pointer; position: relative;
      transition: border-color 0.1s;
    }
    .slot.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.6); }
    .slot-num {
      position: absolute; top: 2px; left: 5px;
      font-size: 10px; color: rgba(255,255,255,0.5);
    }
    .slot-icon { font-size: 22px; }
    #inventory {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    #inv-panel {
      background: rgba(30,30,30,0.95);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 24px;
      min-width: 340px;
    }
    #inv-title {
      color: white; font-family: Arial; font-size: 18px;
      text-align: center; margin-bottom: 16px;
    }
    #inv-grid {
      display: grid;
      grid-template-columns: repeat(9, 52px);
      gap: 6px;
    }
    #inv-hint {
      color: rgba(255,255,255,0.4); font-family: Arial;
      font-size: 12px; text-align: center; margin-top: 12px;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
